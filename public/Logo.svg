<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background container matching premium dark mode -->
  <rect width="32" height="32" rx="8" fill="#0b0f19" stroke="url(#bgGrad)" stroke-width="2"/>
  
  <!-- Bold CH Brand text aligned perfectly in the center -->
  <text x="50%" y="54%" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        fill="#ffffff" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="14" 
        font-weight="900"
        letter-spacing="-0.5px">CH</text>
</svg>
